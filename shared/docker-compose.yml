name: transmedia-alchemist

services:
  # ─── Infrastructure ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alchemist-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - alchemist-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: alchemist-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - alchemist-net

  # ─── Application Services ─────────────────────────────────────────
  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: Dockerfile
    container_name: alchemist-gateway
    restart: unless-stopped
    ports:
      - "18080:8080"
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.momentos-api.rule=Host(`vmi2750025.contaboserver.net`) && PathPrefix(`/api`)
      - traefik.http.routers.momentos-api.entrypoints=http
      - traefik.http.middlewares.strip-api.stripprefix.prefixes=/api
      - traefik.http.routers.momentos-api.middlewares=strip-api
      - traefik.http.services.momentos-api.loadbalancer.server.port=8080
      - traefik.docker.network=coolify
    networks:
      - alchemist-net
      - coolify

  media-engine:
    build:
      context: ../services/media-engine
      dockerfile: Dockerfile
    container_name: alchemist-media-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_SYNTHESIS_URL=http://ai-synthesis:8000
    volumes:
      - job-outputs:/app/output
    depends_on:
      redis:
        condition: service_healthy
      ai-synthesis:
        condition: service_started
    networks:
      - alchemist-net

  ai-synthesis:
    build:
      context: ../services/ai-synthesis
      dockerfile: Dockerfile
    container_name: alchemist-ai-synthesis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - job-outputs:/app/output
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - alchemist-net

  web-client:
    build:
      context: ../apps/web-client
      dockerfile: Dockerfile
    container_name: alchemist-web
    restart: unless-stopped
    ports:
      - "13000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://vmi2750025.contaboserver.net/api
    depends_on:
      - api-gateway
    labels:
      - traefik.enable=true
      - traefik.http.routers.momentos-web.rule=Host(`vmi2750025.contaboserver.net`) && PathPrefix(`/`)
      - traefik.http.routers.momentos-web.entrypoints=http
      - traefik.http.services.momentos-web.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    networks:
      - alchemist-net
      - coolify

# ─── Networks & Volumes ─────────────────────────────────────────────
networks:
  alchemist-net:
    driver: bridge
  coolify:
    external: true

volumes:
  redis-data:
  qdrant-data:
  job-outputs:
